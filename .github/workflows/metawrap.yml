name: Image-Transfer-Final-Boss

on:
  workflow_dispatch:

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo docker image prune -a -f
          df -h

      - name: Login to Docker Hub
        # 使用你刚刚设置的 Secrets 进行登录，彻底解决 Denied 问题
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull and Stream Save
        run: |
          echo "正在以身份验证模式拉取镜像..."
          docker pull ursky/metawrap-mg:1.3.2
          
          echo "正在进行流式压缩并切片..."
          # 依然使用 1500M 分卷，确保下载稳定
          docker save ursky/metawrap-mg:1.3.2 | gzip | split -b 1500M - metawrap_part_
          
          echo "检查切片文件状态..."
          ls -lh metawrap_part_*

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: metawrap-docker-image
          path: metawrap_part_*
          retention-days: 1
